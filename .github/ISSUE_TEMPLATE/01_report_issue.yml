name: Bug report
description: Report a problem with an existing Katari extension
labels: [bug]
body:
  - type: input
    id: extension
    attributes:
      label: Extension information
      description: Enter the extension name and installed version shown in Katari.
      placeholder: Rezka 2.0.2
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Source and language
      description: Identify the source inside the extension and its language.
      placeholder: Rezka Films, Russian
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: entry
    attributes:
      label: Example entry URL
      description: Provide a public example when the problem affects particular content. Do not include credentials or private URLs.

  - type: input
    id: katari-version
    attributes:
      label: Katari version
      description: Find this under More → About.
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: Android 15
    validations:
      required: true

  - type: textarea
    id: other-details
    attributes:
      label: Other details
      description: Add logs or screenshots when useful. Remove tokens, cookies, personal information, and credentials first.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I searched existing open and closed issues and did not find this problem.
          required: true
        - label: I am using the latest available Katari and extension versions.
          required: true
        - label: I confirmed this is an extension problem, not a general Katari application problem.
          required: true
        - label: I did not include credentials, cookies, tokens, or personal information.
          required: true

