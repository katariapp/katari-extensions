name: Pull request

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine changed modules
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          args=(--head "$GITHUB_SHA" --github-output "$GITHUB_OUTPUT")
          if [[ -n "$BASE_SHA" ]]; then
            args+=(--base "$BASE_SHA")
          fi
          python3 scripts/changed_modules.py "${args[@]}"

      - name: Validate repository metadata
        run: python3 scripts/validate_repo_metadata.py

      - name: Check publication scripts
        run: python3 -m compileall -q scripts

      - name: Set up Java
        if: steps.changes.outputs.has_builds == 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        if: steps.changes.outputs.has_builds == 'true'
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build changed extensions
        if: steps.changes.outputs.has_builds == 'true'
        env:
          MODULES_JSON: ${{ steps.changes.outputs.modules }}
        shell: bash
        run: |
          while IFS= read -r module; do
            ./gradlew ":${module//\//:}:assembleDebug"
          done < <(jq -r '.[]' <<< "$MODULES_JSON")
